version: '3.8'

services:
  # Base de donnees MySQL Marsa Maroc
  db:
    image: mysql:8.0
    container_name: marsa_db
    restart: always
    environment:
      MYSQL_DATABASE: marsa_maroc_db
      MYSQL_ROOT_PASSWORD: Kawtar@123
    ports:
      - "3307:3306"
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  # Backend Python (FastAPI + IA)
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: marsa_backend
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=Kawtar@123
      - MYSQL_DATABASE=marsa_maroc_db
    depends_on:
      - db
    volumes:
      - ./app:/app/app
      - ./data:/app/data

  # Frontend React (Vite)
  frontend:
    build:
      context: ./frontend
    container_name: marsa_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
